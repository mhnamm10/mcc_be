services:
  - type: web
    name: erp-bom
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DB_URL
        fromDatabase:
          name: erp-bom-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: erp-bom-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: erp-bom-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_URL
        sync: false
      - key: PORT
        value: 8080

databases:
  - name: erp-bom-db
    databaseName: erp_bom
    plan: free
