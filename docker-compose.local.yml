# Local development only - Do not commit to production
# Usage: podman compose -f docker-compose.local.yml up --build --remove-orphans

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/postgres?currentSchema=erp_bom
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - CLOUDINARY_URL=cloudinary://387828317835664:pczjanPmGwz5176N9NYuWGJQUaA@dmbbwrpro
      - JWT_SECRET=1234567890123456789012345678901234567890123456789012345678901234
      - JWT_EXPIRATION=86400000
      - PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp-local
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - erp-local
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_local_data:
    driver: local

networks:
  erp-local:
    driver: bridge
